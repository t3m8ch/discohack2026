name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Check formatting
        run: cd frontend && bun run format

      - name: Lint
        run: cd frontend && bun run lint

      - name: Typecheck
        run: cd frontend && bun run typecheck

      - name: Build
        run: cd frontend && bun run build

  rust-fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-stable

      - name: Check formatting
        run: cd backend && cargo fmt --all -- --check

  rust-check:
    name: Build and warnings
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-stable

      - name: Check build with warnings denied
        env:
          RUSTFLAGS: -D warnings
        run: cd backend && cargo check --all-targets --all-features

  rust-clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-stable

      - name: Run clippy
        run: cd backend && cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-stable

      - name: Verify Docker is available
        run: docker version

      - name: Run tests
        run: cd backend && cargo test --all-targets --all-features
